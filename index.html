<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOWNLOAD MINECRAFT</title>
    <style>
        /* إعدادات الخلفية المتحركة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* دوائر جمالية في الخلفية */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #3b82f6, #2dd4bf);
            filter: blur(80px);
            z-index: -1;
            animation: move 10s infinite alternate;
        }
        body::after {
            background: linear-gradient(45deg, #8b5cf6, #ec4899);
            right: 10%;
            bottom: 10%;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-50px, -50px); }
            to { transform: translate(50px, 50px); }
        }

        /* حاوية الزر بتصميم زجاجي */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 60px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 90%;
        }

        h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* الزر "الرائع" */
        .btn {
            position: relative;
            display: inline-block;
            padding: 16px 45px;
            color: #fff;
            background: #3b82f6;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.4s;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            background: #2563eb;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.7);
            transform: scale(1.05);
        }

        /* تأثير اللمعان الذي يمر على الزر */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .hint {
            color: #94a3b8;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Ready for download?</h1>
        <a href="minecraft.apk" download class="btn">
            DOWNLOAD
        </a>
        <div class="hint">SAFE & FREE @2026c</div>
    </div>

</body>
</html>
